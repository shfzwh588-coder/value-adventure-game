<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#fff7fb" />
    <title>爱心数独</title>
    <meta name="description" content="手机可玩的高阶数独小游戏。" />
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell" aria-label="爱心数独">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">♡</span>
          <div>
            <h1>爱心数独</h1>
            <p id="puzzleName">高阶挑战</p>
          </div>
        </div>
        <button class="icon-button" id="newGameTop" type="button" aria-label="新局" title="新局">
          ↻
        </button>
      </header>

      <section class="stats" aria-label="当前进度">
        <div>
          <span>时间</span>
          <strong id="timer">00:00</strong>
        </div>
        <div>
          <span>失误</span>
          <strong id="mistakes">0/3</strong>
        </div>
        <div>
          <span>最佳</span>
          <strong id="bestTime">--:--</strong>
        </div>
      </section>

      <section class="board-zone" aria-label="数独棋盘">
        <div id="board" class="sudoku-board" role="grid" aria-label="9乘9数独棋盘"></div>
      </section>

      <section class="number-pad" aria-label="数字键盘">
        <button type="button" data-number="1">1</button>
        <button type="button" data-number="2">2</button>
        <button type="button" data-number="3">3</button>
        <button type="button" data-number="4">4</button>
        <button type="button" data-number="5">5</button>
        <button type="button" data-number="6">6</button>
        <button type="button" data-number="7">7</button>
        <button type="button" data-number="8">8</button>
        <button type="button" data-number="9">9</button>
      </section>

      <section class="tools" aria-label="操作">
        <button id="noteButton" class="tool-button" type="button" aria-pressed="false" title="候选笔记">
          <span aria-hidden="true">✎</span>
          <small>笔记</small>
        </button>
        <button id="eraseButton" class="tool-button" type="button" title="擦除">
          <span aria-hidden="true">⌫</span>
          <small>擦除</small>
        </button>
        <button id="hintButton" class="tool-button" type="button" title="提示">
          <span aria-hidden="true">◇</span>
          <small id="hintCount">提示 3</small>
        </button>
        <button id="checkButton" class="tool-button" type="button" title="检查">
          <span aria-hidden="true">✓</span>
          <small>检查</small>
        </button>
      </section>

      <p id="status" class="status" role="status" aria-live="polite">选一个空格开始。</p>
    </main>

    <div id="dialog" class="dialog" hidden>
      <div class="dialog-panel" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
        <p class="dialog-kicker" id="dialogKicker">完成</p>
        <h2 id="dialogTitle">漂亮，解开了！</h2>
        <p id="dialogText">本局用时 00:00。</p>
        <button id="dialogButton" class="primary-button" type="button">再来一局</button>
      </div>
    </div>
  </body>
</html>
